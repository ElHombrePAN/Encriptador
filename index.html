<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Encriptador</title>
</head>
<header>
    <h1>Alura</h1>
    <h3>Proyecto de Encriptador</h3>
</header>
<body>
    <div>
        <form>
            <textarea placeholder="Ingrese el texto aqui" name="texto" minlength="1" cols="60" rows="14" wrap="hard" required></textarea>
            <br>
            <label for="encriptar">Solo letras minusculas y sin acento</label>
            <br>
            <input type="button" value="Encriptar" id="encriptar" name="Encriptar">
            <input type="button" value="Desencriptar" id="desencriptar" name="Desencriptar">
            <input type="reset">
        </form>
    </div>
</body>
</html>
