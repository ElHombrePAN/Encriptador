<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="El HombrePAN">
  <meta name="description" content="Un encriptador sencillo como parte del desafio del programa Oracle One con Alura">
  <link rel="shortcut icon" href="./assets/c.png" type="image/x-icon" />
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <title>Encriptador</title>
</head>

<body>
  <header class="header">
    <h1><img src="./assets/alura.svg" class="alura"> Encriptador</h1>
  </header>
  <main class="main">
    <section class="principal">
      <div class="lateral">
        <div class="lateral-titulo">
          <h2 class="h2-historial">Historial</h2>
        </div>
        <div id="listaSesiones" class="scrollmenu"></div>
      </div>
      <article class="article-uno">
        <form onreset="mostrarOcultarDivs()">
          <textarea class="textarea-original" placeholder="Ingrese el texto que deseas encriptar aquí... " name="texto"
            minlength="1" autofocus id="textoOriginal" oninput="mostrarOcultarDivs()"></textarea>
          <br>
          <label class="label" for="encriptar">Solo encripta letras minúsculas y sin acento</label>
          <input class="boton" type="button" value="Encriptar" id="encriptar" name="Encriptar" onclick="procesar()">
          <input class="boton" type="button" value="Desencriptar" id="desencriptar" name="Desencriptar"
            onclick="procesarDesencriptar()">
          <input class="boton" type="button" value="Pegar" id="pegar">
          <input class="boton" type="reset" value="Limpiar" onclick="borrarSegundoTextarea()">
          <input class="boton" type="button" value="Guardar" id="guardar">
          <input class="boton" type="button" value="Historial" id="historial">
          <article id="contadorPalabras" class="palabras-e">Palabras encriptadas: 0</article>
        </form>
      </article>
      <article class="article-dos" id="pasivo">
        <img src="./assets/adnubes.svg" class="imagen-b">
        <h3 class="mensaje-info">Ningun mensaje fue encontrado</h3>
        <p class="parrafo">Ingresa el texto que desees encriptar o desencriptar</p>
      </article>
      <article class="article-tres" id="activo">
        <form>
          <textarea class="textarea-modificada" disabled id="textoEncriptado"></textarea>
          <br>
          <label class="label" for="copiar">Usa el boton para copiar tu texto</label>
          <input class="boton copiar" type="button" name="copiar" value="copiar" id="copiar"
            onclick="procesarBotonCopiar()">
        </form>
      </article>
      <div class="notificacion" id="notificacion">
        <span class="mensaje"></span>
        <button class="cerrar" id="cerrar">X</button>
        <br><progress></progress>
      </div>
    </section>
  </main>

  <footer class="footer">
    <h5 class="autor"><a href="https://github.com/ElHombrePAN/Encriptador" class="link">Repositorio disponible en Github <img src="./assets/github-mark.svg" class="github"></a></h5>
    <p class="autor-d">Para el desafio del programa Oracle One Next Education 2023. Creado por Moises Ramirez</p>
  </footer>

</body>
<script src="main.js"></script>

</html>
