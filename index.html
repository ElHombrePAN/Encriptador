<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Encriptador</title>
</head>
<header>
    <h1>Alura</h1>
    <h3>Proyecto de Encriptador</h3>
</header>
<body>
    <script src="main.js"></script>
    <div class="contenedor">
        <form>
            <textarea placeholder="Ingrese el texto aqui" name="texto" minlength="1"required></textarea>
            <br>
            <label for="encriptar">Solo letras minusculas y sin acento</label>
            <br>
            <input type="button" value="Encriptar" id="encriptar" name="Encriptar">
            <input type="button" value="Desencriptar" id="desencriptar" name="Desencriptar">
            <input type="reset">
        </form>
    </div>
    <div class="pasivo">
        <img src="/imagenes/muñeco.svg">
        <h3>Ningun mensaje fue encontrado</h3>
        <p>Ingresa el texto que desees encriptar o desencriptar</p>
    </div>
    <div class="activo">
        <form>
            <textarea readonly></textarea>
            <br>
            <input type="button" name="copiar" value="copiar"></button>
        </form>
    </div>
</body>
</html>
