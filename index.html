<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Encriptador</title>
</head>
<header>
    <h1>Alura</h1>
    <h3>Proyecto de Encriptador</h3>
</header>
<body>
    <div class="contenedor">
        <form onreset="mostrarOcultarDivs()">
            <textarea placeholder="Ingrese el texto aqui" name="texto" minlength="1"required id="textoOriginal" oninput="mostrarOcultarDivs()"></textarea>
            <br>
            <label for="encriptar">Solo letras minusculas y sin acento</label>
            <br>
            <input class="btn-svg" type="button" value="Encriptar" id="encriptar" name="Encriptar" onclick="procesar()">
            <input type="button" value="Desencriptar" id="desencriptar" name="Desencriptar" onclick="procesarDesencriptar()">
            <input type="reset" onclick="borrarSegundoTextarea()">
        </form>
    </div>
    <div class="pasivo" id="pasivo">
        <img src="/assets/muñeco.svg">
        <h3>Ningun mensaje fue encontrado</h3>
        <p>Ingresa el texto que desees encriptar o desencriptar</p>
    </div>
    <div class="activo" id="activo" style="display: none;">
        <form>
            <textarea readonly id="textoEncriptado"></textarea>
            <br>
            <input type="button" name="copiar" value="copiar" onclick="copiarAlPortapapeles()"></button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
